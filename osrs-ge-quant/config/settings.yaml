data_dir: "./data"
db_url: "sqlite:///data/db/osrs_ge.db"

user_agent: "osrs-ge-quant/0.1 (your_email@example.com)"

ge:
  tax_rate: 0.02
  tax_free_threshold: 50
  default_timestep: "24h"
  universe_refresh_hours: 6

news:
  max_articles: 40
  use_chatgpt: true
  openai_model: "gpt-4.1-mini"

analysis:
  default_min_margin_gp: 500
  default_min_daily_volume: 1000
  max_recommendations_per_cycle: 200
  backtest_years: 1

dashboard:
  host: "127.0.0.1"
  port: 8050
  debug: true

hiscores:
  mode: "main"

logging:
  level: "INFO"
